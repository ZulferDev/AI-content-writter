name: AI Content Pipeline

on:
  # schedule:
    # - cron: '0 20 * * *'
  workflow_dispatch:
    inputs:
      niche:
        description: 'Niche topic untuk konten'
        required: false
        default: 'pendidikan'
        type: string

env:
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  GEMINI_API_KEY_FALLBACK: ${{ secrets.GEMINI_API_KEY_FALLBACK }}
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

jobs:
  generate-content:
    name: Generate AI Content
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests
        run: |
          pytest tests/ -v --tb=short || echo "Tests completed (non-critical)"

      - name: Run AI Pipeline
        run: |
          NICHE="${{ github.event.inputs.niche || 'pendidikan' }}"
          echo "Running pipeline for niche: $NICHE"
          python main.py --niche "$NICHE"

      - name: Upload pipeline output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-pipeline-output-${{ github.run_number }}
          path: output/
          retention-days: 30

      - name: Pipeline Summary
        if: always()
        run: |
          echo "## AI Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Niche**: ${{ github.event.inputs.niche || 'pendidikan' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Run**: #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Output saved as artifact: \`ai-pipeline-output-${{ github.run_number }}\`" >> $GITHUB_STEP_SUMMARY
