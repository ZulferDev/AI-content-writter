name: AI Content Pipeline

on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:
    inputs:
      niche:
        description: 'Niche topic untuk konten'
        required: false
        default: 'pendidikan'
        type: string

env:
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  GEMINI_API_KEY_FALLBACK: ${{ secrets.GEMINI_API_KEY_FALLBACK }}
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  SEARXNG_BASE_URL: http://localhost:8080

jobs:
  generate-content:
    name: Generate AI Content
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup Crawl4AI (Playwright)
        run: |
          crawl4ai-setup
          python -c "from crawl4ai import AsyncWebCrawler; print('Crawl4AI OK')"

      - name: Setup SearXNG
        run: |
          git clone --depth 1 https://github.com/searxng/searxng /tmp/searxng
          cd /tmp/searxng
          pip install msgspec
          pip install -e .
          cp $GITHUB_WORKSPACE/config/settings.yml /tmp/searxng/searxng/settings.yml
          cd /tmp/searxng
          python -m searxng &
          SEARXNG_PID=$!
          echo "SEARXNG_PID=$SEARXNG_PID" >> $GITHUB_ENV
          echo "Waiting for SearXNG to start..."
          for i in {1..30}; do
            if curl -s "${SEARXNG_BASE_URL}/search?q=test&format=json" > /dev/null 2>&1; then
              echo "SearXNG is ready!"
              break
            fi
            sleep 2
          done
          curl -s "${SEARXNG_BASE_URL}/search?q=test&format=json" | python -c "
          import sys, json
          data = json.load(sys.stdin)
          print(f'SearXNG OK: {len(data.get(\"results\", []))} results')
          "

      - name: Run Tests
        run: |
          pytest tests/ -v --tb=short || echo "Tests completed (non-critical)"

      - name: Run AI Pipeline
        run: |
          NICHE="${{ github.event.inputs.niche || 'pendidikan' }}"
          echo "Running pipeline for niche: $NICHE"
          python main.py --niche "$NICHE"

      - name: Upload pipeline output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-pipeline-output-${{ github.run_number }}
          path: output/
          retention-days: 30

      - name: Cleanup
        if: always()
        run: |
          if [ -n "$SEARXNG_PID" ]; then
            kill $SEARXNG_PID 2>/dev/null || true
            echo "SearXNG stopped."
          fi
          rm -rf /tmp/searxng
          echo "Cleanup completed."

      - name: Pipeline Summary
        if: always()
        run: |
          echo "## AI Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Niche**: ${{ github.event.inputs.niche || 'pendidikan' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Run**: #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Output saved as artifact: \`ai-pipeline-output-${{ github.run_number }}\`" >> $GITHUB_STEP_SUMMARY
