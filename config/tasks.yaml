# ============================================================
# CREWAI TASKS CONFIGURATION
# ============================================================
# Task descriptions adalah prompt yang akan diterima agent.

# ---- Phase 1: Ideation & Research (Batch) ----

ideation_task:
  description: >-
    Lihat daftar konten yang sudah ada di blog:
    {existing_content_list}

    Kategori yang TERSEDIA (HANYA gunakan ini, JANGAN buat kategori baru):
    {allowed_categories}

    Generate 1 ide konten PREMIUM untuk niche "{niche}" dengan
    target audience "{target_audience}".

    LAKUKAN ANALISIS MENDALAM sebelum menghasilkan ide:
    1. Analisis gap: apa yang belum dibahas dari konten yang sudah ada?
    2. Tren terkini: topik apa yang paling relevan untuk audiens saat ini?
    3. Angle unik: bagaimana pendekatan yang berbeda dan lebih bernilai?
    4. Dampak maksimal: ide mana yang akan memberikan nilai terbanyak?

    Untuk ide premium tersebut, sediakan:
    1. title: Judul artikel yang sangat menarik dan SEO-friendly
    2. alt_text_image: Alt text untuk gambar ilustrasi
    3. reason: Alasan mendalam kenapa ide ini dipilih (sertakan analisis gap dan tren)
    4. purpose: Tujuan konten yang spesifik dan terukur
    5. suggested_categories: Kategori dari daftar yang disediakan (pilih 1-3 kategori)

    Pastikan ide TIDAK duplikat dari konten yang sudah ada.
  expected_output: >-
    JSON object untuk 1 ide premium. Ide memiliki fields:
    title, alt_text_image, reason, purpose, suggested_categories (as array of strings).
  agent: ide_agent

research_task:
  description: >-
    Kamu menerima output dari ideation_task yang berisi 1 ide konten premium.

    Lakukan riset SANGAT MENDALAM untuk ide ini. Lakukan MULTIPLE pencarian
    (minimal 3-5 kali) dengan keyword berbeda untuk mendapatkan perspektif lengkap:

    1. Gunakan tool `google_search` untuk meriset ide dari berbagai sudut pandang
    2. Kumpulkan data statistik terbaru, fakta pendukung, dan kutipan otoritatif
    3. Identifikasi tren, perdebatan, atau perkembangan terkini terkait topik
    4. Catat sumber referensi untuk setiap fakta (URL, publikasi, tahun)

    Output harus berisi:
    - title: Judul ide asli
    - alt_text_image: Alt text ide asli
    - reason: Alasan ide asli
    - purpose: Tujuan ide asli
    - suggested_categories: Kategori ide asli
    - research: Ringkasan hasil riset KOMPREHENSIF dalam format markdown,
      lengkap dengan data statistik, fakta, dan sumber (sources)

    Output harus berupa JSON object untuk 1 ide dengan research yang sangat mendalam.
  expected_output: >-
    JSON object untuk 1 ide premium. Memiliki fields:
    title, alt_text_image, reason, purpose, suggested_categories, research.
  agent: research_agent
  context:
    - ideation_task

# ---- Phase 2: Per-Article Processing ----

writing_task:
  description: >-
    Tulis artikel Markdown berkualitas tinggi untuk satu topik berikut dengan menerapkan teknik penulisan
    ber-retensi tinggi (adiktif layaknya video pendek, menggunakan buckets brigades, cliffhanger, dan tanpa lemak tulisan):
    
    Topik: {title}
    Tujuan: {purpose}
    Target Audience: {target_audience}
    Kategori: {suggested_categories}
    Riset Pendukung: {research_summary}

    Ketentuan menulis:
    1. Format MDX dengan frontmatter lengkap:
       - title: "{title}"
       - description: (meta description, maks 155 karakter)
       - pub_date: (tanggal hari ini)
       - categories: [{suggested_categories}]
        - author: "Tim Pelajarsenja"
        - editor: "Fajar Hadi Tama"
        - alt_text_image: "{alt_text_image}"
    2. Target: 1500-1700 kata
    3. Gunakan heading structure yang rapi: H1 -> H2 -> H3
    4. Pastikan konten berbasis fakta dari riset pendukung yang disediakan
    5. Jangan membuat data palsu
    6. Paragraf pendek (maks 2-3 kalimat) agar mobile-friendly dan penuh dengan white space (scannable).
    7. tambahkan Daftar halaman atas setelah pembukaan
    8. Jangan terlalu sering buat cerita dengan subjek kamu lebih baik buat dengan aku
    8. Jangan gunakan pembukaan "Bayangkan hal ini" buat lebih natural berceritanya
  expected_output: >-
    Artikel Markdown lengkap dengan frontmatter dan body artikel.
  agent: writer_agent

eeat_trust_review_task:
  description: >-
    Review artikel dari writing_task berdasarkan standar E-E-A-T Google (Experience, Expertise, Authoritativeness, Trustworthiness).
    Riset acuan sebagai pembanding: {research_summary}

    Berikan skor 1-10 untuk aspek E-E-A-T & Trust:
    - Experience (Pengalaman): Apakah konten menunjukkan keterlibatan langsung, bukti pengujian nyata, atau perspektif unik dari pembuatnya, bukan sekadar merangkum informasi dari sumber lain?
    - Expertise (Keahlian): Apakah konten ditulis atau ditinjau oleh pihak yang kompeten di bidangnya, didukung oleh fakta yang akurat, serta bebas dari kesalahan dasar atau klaim tanpa bukti?
    - Authoritativeness (Otoritas): Apakah jelas siapa pembuat kontennya (profil/latar belakang penulis), dan apakah situs Anda dikenal serta diakui sebagai sumber yang dapat diandalkan untuk topik tersebut?

    - Trustworthiness (Kredibilitas & Keandalan): Apakah tujuan utama pembuatan konten ini murni untuk membantu pengguna (bukan memanipulasi algoritma), disajikan secara jujur tanpa clickbait, serta transparan mengenai proses pembuatannya (termasuk penggunaan AI/otomatisasi)?

    - User Satisfaction & Page Experience (Kepuasan Pembaca & Pengalaman Halaman): Apakah penyajiannya rapi dan profesional, serta memberikan jawaban komprehensif sehingga pembaca merasa puas tanpa perlu mencari sumber informasi lain?
    
    Berikan skor (1-10) dan feedback perbaikan yang spesifik dan konkret.
  expected_output: >-
    JSON object:
    {
      "aspect": "eeat_trust",
      "score": 8,
      "feedback": ["saran 1", "saran 2"]
    }
  agent: eeat_trust_reviewer
  context:
    - writing_task

seo_ux_review_task:
  description: >-
    Review artikel dari writing_task berdasarkan performa SEO modern dan kenyamanan membaca (UX/Readability).

    Berikan skor 1-10 untuk aspek SEO & UX:
    - SEO Teknis: Struktur heading (H1, H2, H3) logis, meta description efektif (maks 155 karakter), alur keyword natural.
    - UX Readability: Apakah paragraf pendek-pendek (maks 2-3 kalimat)? Apakah ritmenya mengalir adiktif dengan teknik Buckets Brigades atau cliffhanger yang membuat pembaca betah berlama-lama (meningkatkan dwell time)?

    Berikan skor (1-10) dan feedback perbaikan yang spesifik dan konkret.
  expected_output: >-
    JSON object:
    {
      "aspect": "seo_ux",
      "score": 7,
      "feedback": {
        "ai_actions": ["perbaiki meta description jadi < 155 char", "tambah bucket brigade di H2 ke-2"],
        "user_actions": ["validasi desain visual dengan user testing"]
      }
    }
  agent: seo_ux_reviewer
  context:
    - writing_task

people_first_review_task:
  description: >-
    Review artikel dari writing_task untuk memastikan konten mematuhi standar Google "People-First" dan sangat relevan dengan {target_audience}.
    Tujuan awal konten: {purpose}

    Berikan skor 1-10 untuk aspek People-First:
    - Niat Pencarian: Apakah langsung menjawab search intent audiens tanpa bertele-tele atau penuh teks pengisi (filler content/lemak tulisan)?
    - Nilai Tambah: Apakah artikel memberikan kepuasan instan (micro-rewards) dan pemahaman tuntas sehingga audiens tidak perlu kembali ke mesin pencari mencari artikel lain?

    Berikan skor (1-10) dan feedback perbaikan yang spesifik dan konkret.
  expected_output: >-
    JSON object:
    {
      "aspect": "people_first",
      "score": 8,
      "feedback": {
        "ai_actions": ["hapus filler words di intro", "tambah micro-reward di akhir H2"],
        "user_actions": ["tambah insight unik dari domain expertise"]
      }
    }
  agent: people_first_reviewer
  context:
    - writing_task

aggregate_review_task:
  description: >-
    Gabungkan hasil review dari 3 kriteria utama Google (eeat_trust, seo_ux, people_first) yang telah disediakan dalam konteks tugas ini.

    PENTING - Lakukan Pembobotan Skor Sesuai Standar Google:
    1. Ekstrak skor 1-10 dari ketiga aspek.
    2. Hitung Nilai Akhir (Final Weighted Score) dengan rumus bobot berikut:
       - eeat_trust = Bobot 60% (0.60)
       - people_first = Bobot 20% (0.20)
       - seo_ux = Bobot 20% (0.20)
       Rumus: (eeat_trust * 0.6) + (people_first * 0.2) + (seo_ux * 0.2)
     3. Tetapkan threshold kelulusan final_weighted_score >= 9.0. 
        Jika score >= 9.0, maka needs_editing = false. Jika < 9.0, maka needs_editing = true.
    4. Gabungkan seluruh daftar feedback dari ketiga sub-reviewers, tetap pisahkan antara ai_actions dan user_actions:
       - Gabungkan semua ai_actions dari ketiga reviewer ke satu list
       - Gabungkan semua user_actions dari ketiga reviewer ke satu list
    5. Berikan kesimpulan ringkas yang objektif.
  expected_output: >-
    JSON object gabungan:
    {
      "scores": {
        "eeat_trust": 8,
        "people_first": 8,
        "seo_ux": 7
      },
      "final_weighted_score": 7.8,
      "max_score": 10.0,
      "threshold": 9.0,
      "needs_editing": true,
      "feedback": {
        "ai_actions": ["perbaiki struktur heading H2", "tambah kutipan sumber di paragraf 3", "perbaiki meta description"],
        "user_actions": ["tambah pengalaman pribadi penulis", "verifikasi statistik ke ahli", "tambah insight unik"]
      },
      "summary": "Ringkasan review gabungan berbasis pembobotan Google"
    }
  agent: review_aggregator
  context:
    - eeat_trust_review_task
    - seo_ux_review_task
    - people_first_review_task

editing_task:
  description: >-
    Lakukan penyuntingan akhir terhadap artikel asli berdasarkan data dari hasil review gabungan.
    Semua artikel asli dan review gabungan telah disediakan dalam konteks tugas ini.

    Ketentuan:
    1. Jika review_data.needs_editing = false, pertahankan artikel asli sepenuhnya tanpa perubahan.
    2. Jika review_data.needs_editing = true, perbaiki artikel asli dengan cermat mengikuti poin feedback dari ai_actions (saran yang bisa diperbaiki AI). JANGAN coba perbaiki user_actions — itu tugas manusia.
    3. Pastikan struktur heading, kepadatan materi, dan format MDX tetap terjaga dengan rapi.
    4. Set "is_draft": true untuk semua artikel tanpa terkecuali.
       Tidak ada artikel yang langsung di-publish tanpa review manual.
    5. Parse output akhir menjadi format siap insert Supabase dengan struktur JSON persis seperti expected_output.

    PENTING untuk field "content":
    - HANYA sertakan konten ARTI (body) di bawah frontmatter.
    - JANGAN sertakan baris pembatas --- frontmatter (karena sudah dipecah ke field terpisah).
    - JANGAN sertakan mdx codeblock wrapper (seperti ```mdx atau ```).
    - Bersihkan konten dari syntax wrapper markdown code block apa pun.
  expected_output: >-
    JSON object tunggal:
    {
      "title": "{title}",
      "slug": "",
      "description": "meta description",
      "content": "...konten body tanpa frontmatter...",
      "categories": [{suggested_categories}],
      "author": "Tim Pelajarsenja",
      "editor": "Fajar Hadi Tama",
      "alt_text_image": "{alt_text_image}",
      "ai_generated": true,
      "is_draft": true,
      "review_score": 7.8,
      "review_data": {
        "scores": {"eeat_trust": 8, "people_first": 8, "seo_ux": 7},
        "final_weighted_score": 7.8,
        "max_score": 10.0,
        "threshold": 9.0,
        "needs_editing": true,
        "feedback": {
          "ai_actions": ["perbaiki struktur heading H2", "tambah kutipan sumber di paragraf 3", "perbaiki meta description"],
          "user_actions": ["tambah pengalaman pribadi penulis", "verifikasi statistik ke ahli", "tambah insight unik"]
        },
        "summary": "Ringkasan review"
      }
    }
  agent: editor_agent
  context:
    - writing_task
    - aggregate_review_task