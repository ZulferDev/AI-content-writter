# ============================================================
# SEARXNG SETTINGS (Minimal Configuration)
# ============================================================

use_default_settings: true

general:
  instance_name: "AI Pipeline Search"
  debug: false

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "id"
  formats:
    - json

server:
  port: 8080
  bind_address: "0.0.0.0"
  secret_key: "ai-pipeline-temp-key"
  limiter: false
  image_proxy: false

ui:
  static_use_hash: true

redis:
  url: false

default_doi_resolver: "oadoi"
doi_resolvers:
  oadoi:
    name: "oaDOI"
    url: "https://api.oadoi.org/v2/{doi}"

enabled_plugins:
  - "Hash plugin"
  - "Self Information"
  - "Tracker URL remover"
  - "Basic Calculator"
  - "Unit converter plugin"
  - "Hostnames plugin"
  - "Re_replace"
